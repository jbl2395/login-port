<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Login Port</title>
<link rel="apple-touch-icon" id="touch-icon">
<script>
(function(){
  const c=document.createElement('canvas');c.width=c.height=180;
  const ctx=c.getContext('2d');

  /* 角丸クリップ */
  const r=38;
  ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(180-r,0);ctx.quadraticCurveTo(180,0,180,r);
  ctx.lineTo(180,180-r);ctx.quadraticCurveTo(180,180,180-r,180);ctx.lineTo(r,180);
  ctx.quadraticCurveTo(0,180,0,180-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();ctx.clip();

  /* 背景グラデーション */
  const bg=ctx.createLinearGradient(0,0,180,180);
  bg.addColorStop(0,'#04090f');
  bg.addColorStop(0.5,'#08152a');
  bg.addColorStop(1,'#0c1e3a');
  ctx.fillStyle=bg;ctx.fillRect(0,0,180,180);

  /* 背景の微細ドットグリッド */
  ctx.fillStyle='rgba(79,195,247,0.07)';
  for(let x=18;x<180;x+=18){
    for(let y=18;y<180;y+=18){
      ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fill();
    }
  }

  /* 外側グローリング */
  const glow=ctx.createRadialGradient(90,90,38,90,90,72);
  glow.addColorStop(0,'rgba(79,195,247,0.0)');
  glow.addColorStop(0.7,'rgba(79,195,247,0.08)');
  glow.addColorStop(1,'rgba(79,195,247,0.18)');
  ctx.fillStyle=glow;ctx.fillRect(0,0,180,180);

  /* リング（薄い円） */
  ctx.strokeStyle='rgba(79,195,247,0.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(90,90,66,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle='rgba(79,195,247,0.1)';
  ctx.beginPath();ctx.arc(90,90,78,0,Math.PI*2);ctx.stroke();

  /* ===== 鍵マーク ===== */
  const lx=90,ly=92; /* 中心を少し下に */
  const scale=2.6;   /* 拡大倍率 */

  ctx.save();
  ctx.translate(lx,ly);
  ctx.scale(scale,scale);

  /* 鍵のシャドウ（グロー） */
  ctx.shadowColor='rgba(79,195,247,0.7)';
  ctx.shadowBlur=14;

  ctx.strokeStyle='rgba(79,195,247,0.95)';
  ctx.lineWidth=1.5;
  ctx.lineCap='round';
  ctx.lineJoin='round';

  /* 錠前の本体（rect -9,-1 18 11 rx2.5） */
  const rr=2.5;
  const bx=-9,by=-1,bw=18,bh=11;
  ctx.beginPath();
  ctx.moveTo(bx+rr,by);ctx.lineTo(bx+bw-rr,by);
  ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+rr);
  ctx.lineTo(bx+bw,by+bh-rr);ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-rr,by+bh);
  ctx.lineTo(bx+rr,by+bh);ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-rr);
  ctx.lineTo(bx,by+rr);ctx.quadraticCurveTo(bx,by,bx+rr,by);
  ctx.closePath();ctx.stroke();

  /* 錠前の弧（シャックル） */
  ctx.beginPath();
  ctx.moveTo(-6,-1);ctx.lineTo(-6,-5);
  ctx.arc(0,-5,6,Math.PI,0,false);
  ctx.lineTo(6,-1);
  ctx.stroke();

  /* キーホール（中央の穴＋縦棒） */
  ctx.shadowBlur=8;
  ctx.fillStyle='rgba(79,195,247,0.95)';
  ctx.beginPath();ctx.arc(0,4.5,1.4,0,Math.PI*2);ctx.fill();
  ctx.fillRect(-0.8,5.5,1.6,2.8);

  ctx.restore();

  /* 下部ラベル「LOGIN PORT」 */
  ctx.shadowColor='rgba(79,195,247,0.6)';ctx.shadowBlur=6;
  ctx.fillStyle='rgba(79,195,247,0.55)';
  ctx.font='600 9px Arial';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('LOGIN PORT',90,163);

  document.getElementById('touch-icon').href=c.toDataURL('image/png');
})();
</script>

<style>
/* =====================================================
   THEME VARS
===================================================== */
:root{
  --bg-a:#04090f;--bg-b:#080f1c;--bg-c:#0c182e;
  --accent:#4fc3f7;--accent2:#7986cb;
  --accent-dim:rgba(79,195,247,0.14);
  --accent-border:rgba(79,195,247,0.28);
  --glass:rgba(255,255,255,0.045);
  --glass-b:rgba(255,255,255,0.08);
  --glass-c:rgba(255,255,255,0.12);
  --text:#ddeeff;--text-dim:rgba(200,225,255,0.42);
  --text-mid:rgba(200,225,255,0.65);
}
[data-theme="hotpink"]  {--bg-a:#08020e;--bg-b:#120418;--bg-c:#1e0628;--accent:#f472b6;--accent2:#e879f9;--accent-dim:rgba(244,114,182,0.14);--accent-border:rgba(244,114,182,0.3);}
[data-theme="coral"]    {--bg-a:#0e0400;--bg-b:#1a0800;--bg-c:#2c0e00;--accent:#fb923c;--accent2:#f87171;--accent-dim:rgba(251,146,60,0.14);--accent-border:rgba(251,146,60,0.3);}
[data-theme="gold"]     {--bg-a:#0c0800;--bg-b:#181200;--bg-c:#281e00;--accent:#fbbf24;--accent2:#f59e0b;--accent-dim:rgba(251,191,36,0.14);--accent-border:rgba(251,191,36,0.3);}
[data-theme="lime"]     {--bg-a:#010a04;--bg-b:#021408;--bg-c:#032010;--accent:#4ade80;--accent2:#22d3ee;--accent-dim:rgba(74,222,128,0.14);--accent-border:rgba(74,222,128,0.3);}
[data-theme="violet"]   {--bg-a:#060010;--bg-b:#0c0020;--bg-c:#140030;--accent:#a78bfa;--accent2:#818cf8;--accent-dim:rgba(167,139,250,0.14);--accent-border:rgba(167,139,250,0.3);}
[data-theme="crimson"]  {--bg-a:#0e0008;--bg-b:#1c0010;--bg-c:#2c001a;--accent:#f87171;--accent2:#fb7185;--accent-dim:rgba(248,113,113,0.14);--accent-border:rgba(248,113,113,0.3);}
[data-theme="midnight"] {--bg-a:#000002;--bg-b:#03030c;--bg-c:#060618;--accent:#818cf8;--accent2:#6366f1;--accent-dim:rgba(129,140,248,0.14);--accent-border:rgba(129,140,248,0.3);}

/* =====================================================
   BASE
===================================================== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:'Noto Sans JP',sans-serif;
  min-height:100vh;
  background:var(--bg-a);
  background-image:
    radial-gradient(ellipse 80% 40% at 15% 0%,rgba(79,195,247,0.07) 0%,transparent 100%),
    radial-gradient(ellipse 60% 50% at 85% 100%,rgba(121,134,203,0.06) 0%,transparent 100%),
    linear-gradient(175deg,var(--bg-a) 0%,var(--bg-b) 45%,var(--bg-c) 100%);
  color:var(--text);
  overflow-x:hidden;
  transition:background 0.5s;
}
/* dot grid */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(rgba(79,195,247,0.06) 1px,transparent 1px);
  background-size:32px 32px;
}

/* =====================================================
   PAGE SYSTEM  (home / vault)
===================================================== */
.page{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:1}
.page.active{display:flex}

/* =====================================================
   HOME PAGE
===================================================== */
#homePage{
  padding:0 22px 48px;
  align-items:stretch;
  justify-content:flex-start;
}

/* header */
.home-header{
  padding-top:54px;padding-bottom:32px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo-wrap{display:flex;align-items:center;gap:13px}
.logo-badge{position:relative;width:46px;height:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-badge-ring{
  position:absolute;inset:0;border-radius:13px;
  border:1.5px solid var(--accent);
  box-shadow:0 0 14px var(--accent-dim),inset 0 0 10px var(--accent-dim);
  animation:ringPulse 3s ease-in-out infinite;
}
@keyframes ringPulse{0%,100%{opacity:.4;box-shadow:0 0 10px var(--accent-dim)}50%{opacity:.8;box-shadow:0 0 22px rgba(79,195,247,.35)}}
.logo-badge-inner{
  width:36px;height:36px;border-radius:9px;
  background:linear-gradient(135deg,rgba(79,195,247,.14),rgba(121,134,203,.14));
  display:flex;align-items:center;justify-content:center;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.95rem;
  color:var(--accent);letter-spacing:.1em;position:relative;z-index:1;
}
.logo-texts{}
.logo-title{
  font-family:'Rajdhani',sans-serif;font-weight:700;
  font-size:1.5rem;letter-spacing:.2em;color:#fff;
  line-height:1;text-transform:uppercase;
  text-shadow:0 0 22px rgba(79,195,247,.3);
}
.logo-title span{color:var(--accent)}
.logo-sub{
  font-family:'Outfit',sans-serif;font-weight:300;
  font-size:.57rem;color:var(--text-dim);
  letter-spacing:.26em;text-transform:uppercase;margin-top:3px;
}
.gear-btn{
  width:44px;height:44px;border-radius:12px;flex-shrink:0;
  background:var(--glass);border:1px solid var(--glass-b);
  color:var(--text-dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .22s;backdrop-filter:blur(12px);
}
.gear-btn:hover{background:var(--glass-b);color:var(--accent)}
.gear-btn:active{transform:rotate(25deg)}

/* search bar */
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap input{
  width:100%;
  background:rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.1);
  border-radius:16px;
  padding:15px 54px 15px 20px;
  color:var(--text);font-family:'Outfit',sans-serif;font-size:.96rem;
  outline:none;backdrop-filter:blur(14px);transition:all .22s;
}
.search-wrap input::placeholder{color:var(--text-dim);font-size:.88rem}
.search-wrap input:focus{
  background:rgba(255,255,255,.08);
  border-color:var(--accent-border);
  box-shadow:0 0 0 3px var(--accent-dim),0 4px 24px rgba(0,0,0,.3);
}
.search-go-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  width:34px;height:34px;border-radius:10px;
  background:var(--accent-dim);border:1px solid var(--accent-border);
  color:var(--accent);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;
}
.search-go-btn:hover{background:rgba(79,195,247,.25);box-shadow:0 0 14px var(--accent-dim)}
.search-go-btn svg{width:16px;height:16px}

/* camera QR button — wide rectangle */
.home-btns{
  display:flex;flex-direction:column;gap:20px; /* +2mm ≒6px追加 */
  margin-top:56px; /* ≒20mm */
}
.home-wide-btn{
  width:100%;
  background:var(--accent-dim);
  border:1px solid var(--accent-border);
  border-radius:18px;
  padding:20px 24px;
  display:flex;align-items:center;justify-content:flex-start;gap:18px;
  cursor:pointer;color:var(--accent);
  transition:all .22s;backdrop-filter:blur(12px);
  position:relative;overflow:hidden;
  text-align:left;
}
.home-wide-btn::before{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(135deg,rgba(79,195,247,.08) 0%,rgba(121,134,203,.06) 100%);
  opacity:0;transition:opacity .22s;
}
.home-wide-btn:hover::before{opacity:1}
.home-wide-btn:hover{border-color:var(--accent);box-shadow:0 0 28px var(--accent-dim);transform:translateY(-1px)}
.home-wide-btn:active{transform:scale(.98)}
.home-btn-icon{flex-shrink:0;opacity:.9;display:flex;align-items:center;justify-content:center;width:32px;height:32px;}
.home-btn-texts{}
.home-btn-label{
  font-family:'Rajdhani',sans-serif;font-weight:700;
  font-size:1.05rem;letter-spacing:.14em;text-transform:uppercase;color:#fff;line-height:1;
}
.home-btn-sub{
  font-family:'Outfit',sans-serif;font-weight:300;
  font-size:.68rem;color:var(--text-dim);letter-spacing:.06em;margin-top:4px;
}

/* =====================================================
   VAULT PAGE
===================================================== */
#vaultPage{
  padding:0 18px 120px; /* フッター分の余白 */
}

/* =====================================================
   VAULT FIXED FOOTER
===================================================== */
.vault-footer{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  display:none; /* vaultPage表示時のみ表示 */
  align-items:center;justify-content:space-between;
  padding:10px 20px 28px; /* 28px = safe area 考慮 */
  background:linear-gradient(to top,rgba(4,9,16,.92) 60%,transparent 100%);
  backdrop-filter:blur(6px);
  gap:12px;
}
.vault-footer.visible{display:flex}

.vault-footer-scroll{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);
  color:rgba(200,225,255,.5);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;backdrop-filter:blur(8px);
}
.vault-footer-scroll:hover{background:rgba(255,255,255,.13);color:var(--accent)}
.vault-footer-scroll svg{width:18px;height:18px}

.vault-footer-close{
  flex:1;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:22px;
  padding:11px 0;
  color:rgba(200,225,255,.45);
  font-family:'Outfit',sans-serif;font-size:.8rem;letter-spacing:.1em;
  cursor:pointer;transition:all .2s;backdrop-filter:blur(8px);
  text-align:center;
}
.vault-footer-close:hover{background:rgba(255,255,255,.1);color:rgba(200,225,255,.75)}
.vault-header{
  padding-top:52px;padding-bottom:22px;
  display:flex;align-items:center;gap:14px;
}
.vault-back-btn{
  width:40px;height:40px;border-radius:11px;flex-shrink:0;
  background:var(--glass);border:1px solid var(--glass-b);
  color:var(--text-dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.vault-back-btn:hover{background:var(--glass-b);color:var(--accent)}
.vault-page-title{
  font-family:'Rajdhani',sans-serif;font-weight:700;
  font-size:1.2rem;letter-spacing:.18em;text-transform:uppercase;color:#fff;
}
.vault-page-title span{color:var(--accent)}

/* vault search */
.vault-search-wrap{position:relative;margin-bottom:20px}
.vault-search-wrap input{
  width:100%;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.09);
  border-radius:14px;
  padding:13px 18px 13px 44px;
  color:var(--text);font-family:'Outfit',sans-serif;font-size:.9rem;
  outline:none;transition:all .2s;
}
.vault-search-wrap input:focus{border-color:var(--accent-border);background:rgba(255,255,255,.07)}
.vault-search-wrap input::placeholder{color:var(--text-dim)}
.vault-search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:.9rem;pointer-events:none;opacity:.6}

/* =====================================================
   CATEGORY CARDS — glass / semi-transparent
===================================================== */
.categories{display:flex;flex-direction:column;gap:12px}

.cat-card{
  border-radius:16px;overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(16px);
  transition:transform .15s,box-shadow .2s;
}
.cat-card:hover{transform:translateY(-1px)}

/* each category gets a tinted glass look via inline var */
.cat-card-header{
  display:flex;align-items:center;
  padding:12px 13px;cursor:pointer;user-select:none;
  border-bottom:1px solid rgba(255,255,255,.07);
  transition:background .15s;
  gap:8px;
}
.cat-card-header:hover{background:rgba(255,255,255,.04)}

/* 左：アイコン＋タイトル（伸縮可・はみ出しを省略） */
.cat-header-left{
  display:flex;align-items:center;gap:8px;
  flex:1;min-width:0; /* はみ出し防止の核心 */
}
.cat-icon-badge{
  width:32px;height:32px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:.95rem;flex-shrink:0;
}
.cat-title-text{
  font-family:'Outfit',sans-serif;font-weight:700;
  font-size:.88rem;letter-spacing:.02em;
  /* 長いカテゴリ名は省略せず折り返さない — ただし縮む */
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-width:0;
}

/* 中央固定エリア：▶（折りたたみ）＋件数バッジ — 常に同じ位置に揃える */
.cat-header-mid{
  display:flex;align-items:center;gap:5px;
  flex-shrink:0; /* 絶対に縮まない */
}
.cat-count-badge{
  font-size:.64rem;font-weight:700;
  padding:2px 8px;border-radius:20px;
  font-family:'Outfit',sans-serif;
  flex-shrink:0;
}
.cat-collapse-icon{
  font-size:.6rem;opacity:.5;transition:transform .25s;
  flex-shrink:0;
}
.cat-card.collapsed .cat-collapse-icon{transform:rotate(-90deg)}

/* 右：＋ボタン（必要時ゴミ箱も） */
.cat-header-right{
  display:flex;align-items:center;gap:5px;
  flex-shrink:0;
}
.cat-add-btn{
  width:28px;height:28px;border-radius:8px;border:none;
  cursor:pointer;font-size:1.1rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
  background:rgba(255,255,255,.12);color:rgba(255,255,255,.75);
}
.cat-add-btn:hover{background:rgba(255,255,255,.2);color:#fff;transform:scale(1.1)}
.del-cat-btn{
  background:none;border:none;cursor:pointer;
  font-size:.7rem;color:rgba(255,255,255,.2);
  padding:2px 4px;border-radius:5px;transition:color .15s;flex-shrink:0;
}
.del-cat-btn:hover{color:rgba(248,113,113,.7)}

.cat-body{padding:10px 12px 8px}
.cat-body.collapsed-body{display:none}

/* =====================================================
   ENTRY CARDS — glass inside glass
===================================================== */
.entry-card{
  border-radius:11px;padding:11px 13px;margin-bottom:8px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  border-left-width:3px;
  transition:border-color .18s,background .15s;
}
.entry-card:hover{background:rgba(255,255,255,.07)}
.entry-name{
  font-size:.88rem;font-weight:700;color:var(--text);
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:7px;padding-bottom:7px;
  border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;
  font-family:'Outfit',sans-serif;
}
.entry-actions{display:flex;gap:4px;align-items:center}
.del-btn{
  background:none;border:none;cursor:pointer;font-size:.78rem;
  color:rgba(255,255,255,.2);padding:2px 3px;border-radius:5px;transition:color .15s;
}
.del-btn:hover{color:rgba(248,113,113,.7)}
.edit-btn{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  cursor:pointer;font-size:.65rem;color:var(--text-dim);
  padding:2px 8px;border-radius:5px;transition:all .15s;white-space:nowrap;
  font-family:'Outfit',sans-serif;
}
.edit-btn:hover{background:rgba(255,255,255,.12);border-color:var(--accent-border);color:var(--accent)}

.entry-row{display:flex;align-items:center;gap:5px;font-size:.77rem;margin-bottom:5px}
.entry-row .label{
  min-width:78px;max-width:78px;font-size:.64rem;font-weight:600;
  padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;
  background:rgba(255,255,255,.06);color:var(--accent);
  border:1px solid var(--accent-border);font-family:'Outfit',sans-serif;
}
.entry-row .value{
  font-family:'JetBrains Mono',monospace;color:var(--text-mid);
  font-size:.76rem;word-break:break-all;
}
.entry-row .masked{
  font-family:'JetBrains Mono',monospace;
  color:rgba(255,255,255,.25);letter-spacing:.14em;
}
.copy-btn{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  color:var(--text-dim);cursor:pointer;font-size:.65rem;
  padding:2px 8px;border-radius:5px;margin-left:auto;white-space:nowrap;
  transition:all .15s;flex-shrink:0;font-family:'Outfit',sans-serif;
}
.copy-btn:hover{background:rgba(255,255,255,.1);border-color:var(--accent-border);color:var(--accent)}
.toggle-pw{

<!-- ===== LOCK OVERLAY ===== -->
<div class="lock-overlay" id="lockOverlay">
  <div class="lock-card">
    <div class="lock-icon-wrap">
      <div class="lock-ring-outer"></div>
      <div class="lock-ring-inner"></div>
      <svg class="lock-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2.5"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        <circle cx="12" cy="16.5" r="1.2" fill="currentColor" stroke="none"/>
        <line x1="12" y1="17.7" x2="12" y2="19" stroke-width="1.8"/>
      </svg>
    </div>
    <div class="lock-brand">Login<span>Port</span></div>
    <div class="lock-desc">Enter Passcode to Continue</div>
    <div class="lock-dots" id="lockDots">
      <div class="lock-dot"></div><div class="lock-dot"></div>
      <div class="lock-dot"></div><div class="lock-dot"></div>
    </div>
    <input class="lock-input" type="password" id="lockInput" placeholder="passcode"
      maxlength="20" oninput="updateDots()" onkeydown="if(event.key==='Enter')unlockApp()">
    <div class="lock-error" id="lockError"></div>
    <button class="lock-unlock-btn" onclick="unlockApp()">Unlock</button>
    <button class="lock-cancel-btn" onclick="closeLockOverlay()">キャンセル</button>
  </div>
</div>

<!-- ===== SETTINGS MODAL ===== -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">⚙ Settings</span>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="modal-section-title">📋 登録データ</div>
        <div class="io-btns">
          <button class="io-btn io-btn-list" onclick="openDataListDirect()">
            <span class="io-btn-icon">🗂</span>
            <div class="io-btn-texts">
              <div>データ一覧を見る</div>
              <div class="io-btn-sub">登録済み項目を確認・削除</div>
            </div>
          </button>
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">🔐 セキュリティ</div>
        <div class="io-btns">
          <button class="io-btn" onclick="changePasswordFromSettings()">
            <span class="io-btn-icon">🔑</span>
            <div class="io-btn-texts">
              <div>パスワードを変更する</div>
              <div class="io-btn-sub">Login Vault のロック解除パスワード</div>
            </div>
          </button>
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">🎨 テーマカラー</div>
        <div class="theme-grid" id="themeGrid"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">📦 データ管理</div>
        <div class="io-btns">
          <button class="io-btn" onclick="exportJSON()">
            <span class="io-btn-icon">⬇️</span>
            <div class="io-btn-texts"><div>エクスポート（JSON）</div><div class="io-btn-sub">バックアップ用</div></div>
          </button>
          <button class="io-btn" onclick="exportCSV()">
            <span class="io-btn-icon">📊</span>
            <div class="io-btn-texts"><div>エクスポート（CSV）</div><div class="io-btn-sub">Excel・スプレッドシート用</div></div>
          </button>
          <button class="io-btn" onclick="document.getElementById('importFileInput').click()">
            <span class="io-btn-icon">⬆️</span>
            <div class="io-btn-texts"><div>インポート</div><div class="io-btn-sub">JSON / CSV を読み込む</div></div>
          </button>
          <input type="file" id="importFileInput" accept=".json,.csv" onchange="importFile(event)">
        </div>

function doWebSearch(){
  const val=document.getElementById('webSearchInput').value.trim();

  else if(/^[\w-]+\.[a-z]{2,}/i.test(val))url='https://'+val;
  else url='https://www.google.com/search?q='+encodeURIComponent(val);
  window.location.href=url;
}

/* =====================================================

let qrStream=null,qrTimer=null;
function openQR(){document.getElementById('qrModal').classList.add('open');document.getElementById('qrStatus').textContent='カメラを起動中...';startCamera();}
function closeQR(){document.getElementById('qrModal').classList.remove('open');stopCamera();}
function stopCamera(){if(qrTimer){clearInterval(qrTimer);qrTimer=null;}if(qrStream){qrStream.getTracks().forEach(t=>t.stop());qrStream=null;}document.getElementById('qrVideo').style.display='none';}
async function startCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:640},height:{ideal:640}}});
    qrStream=stream;const video=document.getElementById('qrVideo');
    video.srcObject=stream;video.style.display='block';
    document.getElementById('qrStatus').textContent='QRコードをカメラに向けてください';
    qrTimer=setInterval(()=>{if(window._qrDecodeResult){const r=window._qrDecodeResult;window._qrDecodeResult=null;handleQRResult(r);}},400);
  }catch(err){document.getElementById('qrStatus').textContent='カメラへのアクセスが許可されていません';}
}
function handleQRResult(text){
  closeQR();
  if(/^https?:\/\//i.test(text)){toast('QR読み取り完了 → 移動します');setTimeout(()=>{window.location.href=text;},800);}
  else{document.getElementById('webSearchInput').value=text;toast('QR: '+text);}
}

/* =====================================================
   LOCK OVERLAY
===================================================== */
const DEFAULT_PASS='1234';
function getStoredPass(){return localStorage.getItem('lp_lock_pass')||DEFAULT_PASS;}
let _lockCallback=null;

function openLockOverlay(cb){
  _lockCallback=cb;
  document.getElementById('lockInput').value='';
  document.getElementById('lockError').textContent='';
  updateDots();
  document.getElementById('lockOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('lockInput').focus(),220);
}
function closeLockOverlay(){
  document.getElementById('lockOverlay').classList.remove('open');
  _lockCallback=null;
}
function updateDots(){
  const val=document.getElementById('lockInput').value;
  const len=Math.min(val.length,4);
  document.querySelectorAll('.lock-dot').forEach((d,i)=>d.classList.toggle('filled',i<len));
}
function unlockApp(){
  const input=document.getElementById('lockInput').value;
  const err=document.getElementById('lockError');
  if(!input){err.textContent='パスワードを入力してください';return;}
  if(input===getStoredPass()){
    document.getElementById('lockOverlay').classList.remove('open');
    err.textContent='';
    if(_lockCallback){_lockCallback();_lockCallback=null;}
  }else{
    err.textContent='パスワードが違います';
    document.getElementById('lockInput').value='';updateDots();
    document.getElementById('lockInput').focus();
  }
}
function changePassword(){
  const c=prompt('現在のパスワードを入力してください');if(c===null)return;
  if(c!==getStoredPass()){alert('現在のパスワードが違います');return;}
  const np=prompt('新しいパスワード（4〜20文字）');if(!np||np.length<4){alert('4文字以上で設定してください');return;}
  const cf=prompt('新しいパスワード（確認）');if(np!==cf){alert('パスワードが一致しません');return;}
  localStorage.setItem('lp_lock_pass',np);alert('パスワードを変更しました！');
}

function renderDataList(){

    group.appendChild(hdr);

      const siteName=entry[cat.fields[0]]||'(無題)';

      el.innerHTML=`

/* =====================================================
   FUZZY SEARCH
===================================================== */
function toH(s){return s.replace(/[\u30A1-\u30F6]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60));}
function toK(s){return s.replace(/[\u3041-\u3096]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60));}
const RMAP=[['amazon','アマゾン'],['amaz','アマゾン'],['ama','アマ'],['apple','アップル'],['google','グーグル'],['yahoo','ヤフー'],['twitter','ツイッター'],['instagram','インスタ'],['insta','インスタ'],['facebook','フェイスブック'],['line','ライン'],['rakuten','楽天'],['paypay','ペイペイ'],['docomo','ドコモ'],['softbank','ソフトバンク']];
const K2R=[['アマゾン','amazon'],['アップル','apple'],['グーグル','google'],['ヤフー','yahoo'],['ツイッター','twitter'],['インスタ','instagram'],['フェイスブック','facebook'],['ライン','line'],['楽天','rakuten'],['ペイペイ','paypay'],['ドコモ','docomo'],['ソフトバンク','softbank'],['ア','a'],['イ','i'],['ウ','u'],['エ','e'],['オ','o'],['カ','ka'],['キ','ki'],['ク','ku'],['ケ','ke'],['コ','ko'],['サ','sa'],['シ','shi'],['ス','su'],['セ','se'],['ソ','so'],['タ','ta'],['チ','chi'],['ツ','tsu'],['テ','te'],['ト','to'],['ナ','na'],['ニ','ni'],['ヌ','nu'],['ネ','ne'],['ノ','no'],['ハ','ha'],['ヒ','hi'],['フ','fu'],['ヘ','he'],['ホ','ho'],['マ','ma'],['ミ','mi'],['ム','mu'],['メ','me'],['モ','mo'],['ヤ','ya'],['ユ','yu'],['ヨ','yo'],['ラ','ra'],['リ','ri'],['ル','ru'],['レ','re'],['ロ','ro'],['ワ','wa'],['ン','n'],['ガ','ga'],['ギ','gi'],['グ','gu'],['ゲ','ge'],['ゴ','go'],['ザ','za'],['ジ','ji'],['ズ','zu'],['ゼ','ze'],['ゾ','zo'],['ダ','da'],['デ','de'],['ド','do'],['バ','ba'],['ビ','bi'],['ブ','bu'],['ベ','be'],['ボ','bo'],['パ','pa'],['ピ','pi'],['プ','pu'],['ペ','pe'],['ポ','po'],['ッ',''],['ー','']];
function k2r(s){let r=toK(s);K2R.forEach(([k,v])=>{r=r.split(k).join(v);});return r;}
function fuzzyMatch(text,q){
  const t=text.toLowerCase();q=q.toLowerCase().trim();if(!q)return true;
  const v=new Set([q,toH(q),toK(q)]);const qr=k2r(q);if(qr)v.add(qr);
  for(const[r,k]of RMAP){if(r.startsWith(q)||q.startsWith(r)||r.startsWith(qr)||qr.startsWith(r)){v.add(k);v.add(toH(k));v.add(r);}}
  for(const x of v){if(!x)continue;if(t.includes(x)||toH(t).includes(x)||toK(t).includes(x))return true;}
  return false;
}

/* =====================================================
   EXPORT / IMPORT
===================================================== */
function exportJSON(){
  const out={categories:getCats(),entries:loadData(),exportedAt:new Date().toISOString()};
  dl('loginport_backup.json',JSON.stringify(out,null,2),'application/json');toast('JSONをエクスポートしました');
}
function exportCSV(){
  const cats=getCats();const data=loadData();
  const rows=[['カテゴリ','フィールド名','値']];
  cats.forEach(cat=>{(data[cat.id]||[]).forEach(entry=>{Object.entries(entry).forEach(([k,v])=>{rows.push([cat.label,k,v]);});});});
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  dl('loginport_backup.csv','\uFEFF'+csv,'text/csv');toast('CSVをエクスポートしました');
}
function dl(name,content,type){
  const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function importFile(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result;
    if(file.name.endsWith('.json'))impJSON(text);
    else if(file.name.endsWith('.csv'))impCSV(text);
    else toast('JSON または CSV を選択してください');
  };
  reader.readAsText(file,'UTF-8');event.target.value='';
}
function impJSON(text){
  try{const obj=JSON.parse(text);if(obj.categories)saveCatMeta(obj.categories);if(obj.entries)saveData(obj.entries);closeSettings();renderAll();toast('インポートが完了しました！');}
  catch{toast('JSONの読み込みに失敗しました');}
}
function impCSV(text){
  const clean=text.replace(/^\uFEFF/,'');const lines=clean.split(/\r?\n/).filter(l=>l.trim());
  const cats=getCats();const data=loadData();
  lines.slice(1).forEach(line=>{
    const cols=parseCSV(line);if(cols.length<3)return;
    const[catLabel,fieldName,value]=cols;const cat=cats.find(c=>c.label===catLabel);if(!cat)return;
    if(!data[cat.id])data[cat.id]=[];const entries=data[cat.id];
    const isFirst=['サービス名','書類・カード名','端末名','システム名'].includes(fieldName);
    if(!entries.length||isFirst)entries.push({});
    entries[entries.length-1][fieldName]=value;
  });
  saveData(data);closeSettings();renderAll();toast('CSVインポートが完了しました！');
}
function parseCSV(line){
  const res=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;}}
    else if(ch===','&&!inQ){res.push(cur);cur='';}else{cur+=ch;}
  }
  res.push(cur);return res;
}

/* =====================================================
   RENDER VAULT
===================================================== */
function renderAll(){
  const c=document.getElementById('categoriesContainer');c.innerHTML='';
  getCats().forEach((cat,i)=>c.appendChild(buildSection(cat,i)));
}

function buildSection(cat,catIndex){
  const cg=getCG(catIndex);
  const entries=getData(cat.id);
  const isCol=localStorage.getItem('lp_col_'+cat.id)==='1';

  const card=document.createElement('div');
  card.className='cat-card'+(isCol?' collapsed':'');
  card.dataset.catId=cat.id;
  card.style.background=`${cg.tint}0.07)`;
  card.style.borderColor=`${cg.border}0.18)`;

  const hdr=document.createElement('div');hdr.className='cat-card-header';
  hdr.innerHTML=`
    <div class="cat-header-left">
      <div class="cat-icon-badge" style="background:${cg.tint}0.18);border:1px solid ${cg.border}0.28)">${cat.icon}</div>
      <span class="cat-title-text" style="color:${cg.text}">${cat.label}</span>
    </div>
    <div class="cat-header-mid">
      <span class="cat-count-badge" style="background:${cg.tint}0.15);color:${cg.accent};border:1px solid ${cg.border}0.3)" id="count-${cat.id}">${entries.length}</span>
      <span class="cat-collapse-icon" style="color:${cg.accent}">▼</span>
    </div>
    <div class="cat-header-right">
      <button class="cat-add-btn" style="background:${cg.tint}0.18);color:${cg.accent}" onclick="toggleForm('${cat.id}',event)" title="新規追加">＋</button>
      ${cat.custom?`<button class="del-cat-btn" onclick="event.stopPropagation();deleteCategory('${cat.id}')">🗑</button>`:''}
    </div>`;
  hdr.addEventListener('click',function(e){
    if(e.target.closest('.cat-add-btn,.del-cat-btn'))return;
    const col=card.classList.toggle('collapsed');
    localStorage.setItem('lp_col_'+cat.id,col?'1':'0');
  });
  card.appendChild(hdr);

  const body=document.createElement('div');
  body.className='cat-body'+(isCol?' collapsed-body':'');
  body.id='list-'+cat.id;
  body.appendChild(buildForm(cat,cg));

  if(!entries.length){
    const empty=document.createElement('div');
    empty.className='no-results';empty.id='empty-'+cat.id;
    empty.textContent='まだ登録がありません';body.appendChild(empty);
  }else{
    entries.forEach((entry,i)=>body.appendChild(buildCard(cat,entry,i,cg)));
  }
  card.appendChild(body);

  const obs=new MutationObserver(()=>{
    if(card.classList.contains('collapsed'))body.classList.add('collapsed-body');
    else body.classList.remove('collapsed-body');
  });
  obs.observe(card,{attributes:true,attributeFilter:['class']});
  return card;
}

function buildForm(cat,cg){
  const form=document.createElement('div');
  form.className='add-form';form.id='form-'+cat.id;
  form.style.borderColor=`${cg.border}0.3)`;
  form.style.background=`${cg.tint}0.05)`;
  cat.fields.forEach(f=>{
    const row=document.createElement('div');row.className='form-row';
    const isBig=f==='備考';const isSens=SENSITIVE.includes(f);
    row.innerHTML=`<div class="form-label">${f}</div>
      ${isBig?`<textarea data-field="${f}" placeholder="${f}を入力"></textarea>`
             :`<input type="${isSens?'password':'text'}" data-field="${f}" placeholder="${f}を入力">`}`;
    form.appendChild(row);
  });
  const btns=document.createElement('div');btns.className='form-btns';
  btns.innerHTML=`<button class="btn-cancel" onclick="toggleForm('${cat.id}',event)">キャンセル</button><button class="btn-save" onclick="saveEntry('${cat.id}')">保存する</button>`;
  form.appendChild(btns);return form;
}

function buildCard(cat,entry,idx,cg){
  const card=document.createElement('div');
  card.className='entry-card';
  card.dataset.search=Object.values(entry).join(' ')+' '+Object.keys(entry).join(' ');
  card.style.borderLeftColor=cg.accent;
  card.style.borderColor=`${cg.border}0.18)`;
  const name=esc(entry[cat.fields[0]]||'(無題)');
  let rows='';
  cat.fields.forEach(f=>{
    if(!entry[f])return;
    const isSens=SENSITIVE.includes(f);
    const safe=entry[f].replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const disp=esc(entry[f]);
    if(isSens){rows+=`<div class="entry-row"><span class="label" style="color:${cg.accent};border-color:${cg.border}0.3);background:${cg.tint}0.08)">${f}</span><span class="masked" data-val="${entry[f].replace(/"/g,'&quot;')}">••••••</span><button class="toggle-pw" onclick="toggleMask(this)">表示</button><button class="copy-btn" onclick="copyText('${safe}')">コピー</button></div>`;}
    else{rows+=`<div class="entry-row"><span class="label" style="color:${cg.accent};border-color:${cg.border}0.3);background:${cg.tint}0.08)">${f}</span><span class="value">${disp}</span><button class="copy-btn" onclick="copyText('${safe}')">コピー</button></div>`;}
  });
  card.innerHTML=`
    <div class="entry-name" onclick="toggleCard(this)">
      <span>${name}<span class="entry-toggle-icon">▶</span></span>
      <div class="entry-actions">
        <button class="edit-btn" onclick="event.stopPropagation();toggleInlineEdit('${cat.id}',${idx})">✏️ 編集</button>
        <button class="del-btn" onclick="event.stopPropagation();deleteEntry('${cat.id}',${idx})">🗑</button>
      </div>
    </div>
    <div class="entry-body">
      ${rows}
      <div class="inline-edit-form" id="ie-${cat.id}-${idx}">
        ${cat.fields.map(f=>{const isBig=f==='備考';const isSens=SENSITIVE.includes(f);const val=(entry[f]||'').replace(/"/g,'&quot;');return`<div class="form-row"><div class="form-label">${f}</div>${isBig?`<textarea data-field="${f}">${entry[f]||''}</textarea>`:`<input type="${isSens?'password':'text'}" data-field="${f}" value="${val}">`}</div>`;}).join('')}
        <div class="form-btns">
          <button class="btn-cancel" onclick="closeIE('${cat.id}',${idx})">キャンセル</button>
          <button class="btn-save" onclick="saveIE('${cat.id}',${idx})">更新する</button>
        </div>
      </div>
    </div>`;
  return card;
}

function toggleInlineEdit(catId,idx){
  const form=document.getElementById(`ie-${catId}-${idx}`);
  const eb=form.closest('.entry-body');
  eb.classList.add('open');eb.previousElementSibling.classList.add('opened');
  form.classList.toggle('open');
  if(form.classList.contains('open'))form.querySelector('input,textarea')?.focus();
}
function closeIE(catId,idx){document.getElementById(`ie-${catId}-${idx}`).classList.remove('open');}
function saveIE(catId,idx){
  const form=document.getElementById(`ie-${catId}-${idx}`);
  const entries=getData(catId);const entry={};
  form.querySelectorAll('[data-field]').forEach(el=>{if(el.value.trim())entry[el.dataset.field]=el.value.trim();});
  if(!Object.keys(entry).length){toast('内容を入力してください');return;}
  entries[idx]=entry;setData(catId,entries);toast('更新しました！');renderAll();filterEntries();
}
function toggleMask(btn){
  const span=btn.previousElementSibling;
  if(span.textContent==='••••••'){span.textContent=span.dataset.val;btn.textContent='非表示';}
  else{span.textContent='••••••';btn.textContent='表示';}
}
function toggleCard(nameEl){nameEl.nextElementSibling.classList.toggle('open');nameEl.classList.toggle('opened');}
function toggleForm(catId,e){
  e.stopPropagation();const form=document.getElementById('form-'+catId);
  form.classList.toggle('open');
  if(form.classList.contains('open')){form.querySelectorAll('input,textarea').forEach(i=>i.value='');form.querySelector('input,textarea')?.focus();}
}
function saveEntry(catId){
  const form=document.getElementById('form-'+catId);const entry={};
  form.querySelectorAll('[data-field]').forEach(el=>{if(el.value.trim())entry[el.dataset.field]=el.value.trim();});
  if(!Object.keys(entry).length){toast('内容を入力してください');return;}
  const entries=getData(catId);entries.unshift(entry);setData(catId,entries);
  toast('登録しました！');renderAll();filterEntries();
}
function deleteEntry(catId,idx){
  if(!confirm('このエントリを削除しますか？'))return;
  const entries=getData(catId);entries.splice(idx,1);setData(catId,entries);
  toast('削除しました');renderAll();filterEntries();
}
function filterEntries(){
  const q=document.getElementById('searchInput').value.trim();
  getCats().forEach(cat=>{
    const sec=document.querySelector(`[data-cat-id="${cat.id}"]`);
    const list=document.getElementById('list-'+cat.id);if(!list)return;
    const cards=list.querySelectorAll('.entry-card');let visible=0;
    cards.forEach(card=>{
      const match=fuzzyMatch(card.dataset.search||card.textContent,q);
      card.classList.toggle('hidden',!match);
      if(match){visible++;
        if(q){const eb=card.querySelector('.entry-body');const ne=card.querySelector('.entry-name');if(eb&&!eb.classList.contains('open')){eb.classList.add('open');ne.classList.add('opened');}}
        else{const eb=card.querySelector('.entry-body');const ne=card.querySelector('.entry-name');if(eb){eb.classList.remove('open');ne.classList.remove('opened');}}
      }
    });
    const empty=document.getElementById('empty-'+cat.id);
    if(empty)empty.classList.toggle('hidden',getData(cat.id).length>0||!!q);
    sec.classList.toggle('hidden',!!q&&!visible);
    if(q&&visible&&sec){sec.classList.remove('collapsed');list.classList.remove('collapsed-body');}
  });
}

/* =====================================================
   UTILS
===================================================== */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}
function copyText(text){navigator.clipboard.writeText(text).then(()=>toast('コピーしました！'));}
const backTop=document.getElementById('backTop');
window.addEventListener('scroll',()=>backTop.classList.toggle('visible',window.scrollY>300));
function scrollToTop(){window.scrollTo({top:0,behavior:'smooth'});}

/* =====================================================
   INIT
===================================================== */
window.addEventListener('load',function(){
  const t=localStorage.getItem('lp_theme')||'ocean';
  if(t!=='ocean')document.documentElement.dataset.theme=t;
  if(!loadCatMeta())saveCatMeta(DEFAULT_CATEGORIES);
  renderAll();
});
</script>
